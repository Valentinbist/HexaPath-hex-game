name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

concurrency:
  group: deploy-${{ inputs.environment || 'dev' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    env:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      STACK: ${{ inputs.environment == 'prod' && 'hex-prod' || 'hex-dev' }}
      WORKER_NAME: ${{ inputs.environment == 'prod' && 'hexapath' || 'hexapath-dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          check-latest: true
          cache: "pnpm"
          cache-dependency-path: infra/pnpm-lock.yaml

      - name: Install Pulumi CLI
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Get Cloudflare credentials from Pulumi
        working-directory: infra
        run: |
          pulumi stack select Valentinbister/$STACK
          echo "CLOUDFLARE_ACCOUNT_ID=$(pulumi config get accountId)" >> $GITHUB_ENV
          echo "CLOUDFLARE_API_TOKEN<<PULUMI_SECRET" >> $GITHUB_ENV
          pulumi config --show-secrets --json | jq -r '."cloudflare:apiToken".value // ."cloudflare:apiToken"' >> $GITHUB_ENV
          echo "PULUMI_SECRET" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy Worker
        run: bunx wrangler deploy --name "$WORKER_NAME"

      - name: Install infra dependencies
        working-directory: infra
        run: pnpm install --frozen-lockfile

      - name: Build infra (TypeScript)
        working-directory: infra
        run: pnpm run build

      - name: Apply infra (custom domain + Zero Trust)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select Valentinbister/$STACK
          pulumi up --yes
